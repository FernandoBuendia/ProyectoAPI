repos:
  - repo: https://github.com/psf/black
    rev: 26.5.0  
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: '7.0.0'  
    hooks:
    -   id: flake8

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "79"]